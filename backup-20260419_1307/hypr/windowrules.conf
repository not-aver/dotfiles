# Layer Rules - Blur
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = rofi
}

layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = notifications
}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-4
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-notification-window
}

layerrule {
  name = layerrule-5
  blur = on
  ignore_alpha = 0
  match:namespace = waybar
}

layerrule {
  name = layerrule-6
  blur = on
  ignore_alpha = 0
  match:namespace = logout_dialog
}


# Layer Rules - Ignore Alpha
layerrule {
  name = layerrule-7
  ignore_alpha = 0
  no_anim = on
  match:namespace = selection
}


# Layer Rules - No Animation

