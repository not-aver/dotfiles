# Window Rules - Floating Applications
windowrule {
  name = windowrule-1
  float = on
  tag = +hyde_floating_apps
  match:class = ^(blueman-manager)$
}


windowrule {
  name = windowrule-2
  float = on
  tag = +hyde_floating_apps
  match:class = ^(pavucontrol-qt)$
}


windowrule {
  name = windowrule-3
  float = on
  tag = +hyde_floating_apps
  match:class = ^(com\.gabm\.satty)$
}


windowrule {
  name = windowrule-4
  float = on
  tag = +hyde_floating_apps
  match:class = ^(org\.kde\.dolphin)$
}


windowrule {
  name = windowrule-5
  float = on
  tag = +hyde_floating_apps
  match:class = ^(vlc)$
}


windowrule {
  name = windowrule-6
  float = on
  tag = +hyde_floating_apps
  match:class = ^(kvantummanager)$
}


windowrule {
  name = windowrule-7
  float = on
  tag = +hyde_floating_apps
  match:class = ^(qt[56]ct)$
}


windowrule {
  name = windowrule-8
  float = on
  tag = +hyde_floating_apps
  match:class = ^(nwg-(look|displays))$
}


windowrule {
  name = windowrule-9
  float = on
  tag = +hyde_floating_apps
  match:class = ^(org\.kde\.ark)$
}


windowrule {
  name = windowrule-10
  float = on
  tag = +hyde_floating_apps
  match:class = ^(org\.pulseaudio\.pavucontrol)$
}


windowrule {
  name = windowrule-11
  float = on
  tag = +hyde_floating_apps
  match:class = ^(nm-(applet|connection-editor))$
}


windowrule {
  name = windowrule-12
  float = on
  tag = +hyde_floating_apps
  match:class = ^(org\.kde\.polkit-kde-authentication-agent-1)$
}


windowrule {
  name = windowrule-13
  float = on
  tag = +hyde_floating_apps
  match:class = ^(console-dropdown)$
}


# Common Popups
windowrule {
  name = windowrule-14
  tag = +hyde_common_popups
  match:title = ^(Choose Files|Save As|Confirm to replace files|File Operation Progress|Open|Authentication Required|Add Folder to Workspace|File Upload.*|Choose wallpaper.*|Library.*|.*dialog.*)$
}

windowrule {
  name = windowrule-15
  float = on
  center = on
  match:tag = hyde_common_popups
}


windowrule {
  name = windowrule-16
  tag = +hyde_common_popups
  float = on
  center = on
  match:initial_title = ^(Open File|Volume Control|Save As.*)$
}


windowrule {
  name = windowrule-17
  tag = +hyde_common_popups
  float = on
  center = on
  match:class = ^(.*dialog.*|[Xx]dg-desktop-portal-gtk)$
}


# Portal Dialogs
windowrule {
  name = windowrule-18
  tag = +portal-dialogs
  match:class = ^(org\.freedesktop\.impl\.portal\.desktop\.(hyprland|gtk)|[Xx]dg-desktop-portal-gtk)$
}

windowrule {
  name = windowrule-19
  float = on
  center = on
  match:tag = portal-dialogs
}


# Picture-in-Picture
windowrule {
  name = windowrule-20
  tag = +hyde_picture_in_picture
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
}

windowrule {
  name = windowrule-21
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.73)) ((monitor_h*0.72))
  size = (monitor_w*0.25) (monitor_h*0.25)
  pin = on
  match:tag = picture-in-picture
}


# Tag-based rules
windowrule {
  name = windowrule-22
  float = on
  match:tag = hyde_floating_apps
}

windowrule {
  name = windowrule-23
  float = on
  center = on
  match:tag = hyde_portal_dialogs
}



